
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Chivo+Mono:wght@400;700&family=Permanent+Marker&display=swap');

        :root {
            --step-color: #ff4da6;
            --ui-accent: #00f3c3; 
            --led-on: #999999;
            --wood-dark: #111;     
            --metal-panel: #151515;

        }

        * { box-sizing: border-box; touch-action: none; -webkit-user-select: none; }
        body { margin: 0; background: #050505; color: var(--text-print); font-family: 'Chivo Mono', monospace; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; padding: 10px; }
        .rack { background: var(--wood-dark); background-image: url('https://www.transparenttextures.com/patterns/dark-wood.png'); padding: 20px; border-radius: 8px; border: 4px solid #111; box-shadow: 0 30px 80px rgba(0,0,0,1); position: relative; }
        .panel { background: var(--metal-panel); background-image: linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px); background-size: 3px 100%; border: 2px solid #333; padding: 25px; border-radius: 2px; width: 96vw; max-width: 960px; position: relative; box-shadow: inset 0 0 20px rgba(0,0,0,0.8); }

        .header-box { position: relative; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid #333; }

        .title { font-family: 'Permanent Marker', cursive; font-size: 1.1rem; margin: 0; color: #fff; letter-spacing: 1px; text-shadow: 0 0 5px var(--ui-accent), 0 0 10px var(--ui-accent); -webkit-text-stroke: 1px rgba(0,0,0,0.5); text-stroke: 1px rgba(0,0,0,0.5); cursor: pointer; transition: all 0.3s ease; }
        .title:hover { text-shadow: 0 0 10px #fff, 0 0 20px var(--ui-accent); }

        .lcd-container { display: flex; align-items: center; gap: 8px; position: absolute; left: 50%; transform: translateX(-50%); }
        .lcd-display { background: #000; width: 220px; height: 38px; border: 2px solid var(--ui-accent); border-radius: 4px; display: flex; flex-direction: column; justify-content: center; padding: 0 10px; box-shadow: inset 0 0 8px var(--ui-accent), 0 0 5px var(--ui-accent); transition: all 0.5s ease; }
        .lcd-text-top { font-size: 8px; color: var(--ui-accent); letter-spacing: 2px; text-transform: uppercase; font-weight: bold; opacity: 0.8; }
        .lcd-text-main { font-size: 12px; color: var(--ui-accent); font-weight: bold; letter-spacing: 1px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

        .lcd-btn { background: #000; border: 1px solid var(--ui-accent); color: var(--ui-accent); width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; border-radius: 3px; font-weight: bold; box-shadow: 0 0 5px var(--ui-accent); transition: all 0.3s ease; }
        .lcd-btn:active { background: #111; transform: scale(0.95); }

        .save-btn { background: #000; color: #ff5555; border-color: #ff3333; font-size: 8px; box-shadow: 0 0 5px #ff3333; }
        .save-btn.active { color: #55ff55; border-color: #33ff33; box-shadow: 0 0 8px #33ff33; }

        .right-header-controls { display: flex; align-items: center; gap: 15px; }
        .skin-btn { font-family: 'Chivo Mono', monospace; font-size: 8px; padding: 6px 10px; background: #000; border: 2px solid var(--ui-accent); color: var(--ui-accent); box-shadow: inset 0 0 5px var(--ui-accent), 0 0 5px var(--ui-accent); border-radius: 3px; cursor: pointer; text-transform: uppercase; height: 30px; font-weight: bold; transition: all 0.5s ease; }
        .skin-btn:active { background: #111; transform: scale(0.95); }

        .vol-header-box { display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .vol-label { font-size: 7px; color: var(--ui-accent); text-transform: uppercase; font-weight: 700; text-shadow: 0 0 3px var(--ui-accent); }
        .vol-knob-wrapper { position: relative; width: 28px; height: 28px; display: flex; justify-content: center; align-items: center; cursor: ns-resize; }
        .vol-led-ring { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: conic-gradient(var(--ui-accent) var(--v, 0deg), #333 0deg); mask: radial-gradient(transparent 58%, black 60%); -webkit-mask: radial-gradient(transparent 58%, black 60%); transform: rotate(-140deg); }
        .vol-knob { width: 18px; height: 18px; background: #111; border-radius: 50%; border: 1px solid #444; z-index: 2; }

        .seq-row { display: grid; grid-template-columns: repeat(16, 1fr); gap: 6px; margin-bottom: 8px; }
        .step-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; transition: opacity 0.3s ease, filter 0.3s ease; }

        .step { width: 100%; height: 35px; background: #2a2a2a; border: 1px solid #444; cursor: pointer; border-radius: 2px; transition: background 0.2s; }
        .step.on { background: var(--step-color); box-shadow: 0 0 15px var(--step-color), 0 0 5px #fff; border-color: #fff; }
        .step.now { border: 2px solid #fff; transform: scale(1.05); z-index: 5; }

        .note-sel, .oct-sel { width: 100%; background: #000; color: #666; border: 1px solid #333; font-size: 8px; outline: none; text-align: center; cursor: pointer; }
        .len-selector { display: grid; grid-template-columns: repeat(16, 1fr); gap: 4px; margin: 15px 0; padding: 8px; background: #000; border-radius: 4px; border: 1px solid #333; }

        .len-btn { height: 22px; background: #1a1a1a; border: 1px solid #444; color: #666; font-size: 9px; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 2px; transition: all 0.2s; }
        .len-btn.active { background: #000; color: var(--ui-accent); border-color: var(--ui-accent); box-shadow: 0 0 10px var(--ui-accent); }

        .controls { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; margin-bottom: 25px; position: relative; }
        .k-box { display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative;}
        .k-label { font-size: 8px; color: var(--ui-accent); text-transform: uppercase; font-weight: 700; text-align: center; text-shadow: 0 0 5px var(--ui-accent); transition: all 0.5s ease; }

        .knob-row-layout { display: flex; align-items: center; gap: 6px; position: relative; }

        .k-knob-wrapper { position: relative; width: 50px; height: 50px; display: flex; justify-content: center; align-items: center; cursor: ns-resize; }
        .k-led-ring { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: conic-gradient(var(--ui-accent) var(--v, 0deg), #333 0deg); mask: radial-gradient(transparent 58%, black 60%); -webkit-mask: radial-gradient(transparent 58%, black 60%); transform: rotate(-140deg); transition: background 0.3s; }
        .k-knob { width: 32px; height: 32px; background: #111; border-radius: 50%; border: 2px solid #333; z-index: 2; box-shadow: 2px 4px 6px #000; }
        .k-val { font-size: 8px; color: #fff; font-weight: 700; margin-top: 2px; text-align: center; }

        .wave-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-bottom: 8px; width: 60px; }
        .w-btn { font-size: 8px; padding: 5px 2px; background: #111; border: 1px solid #444; color: #555; cursor: pointer; border-radius: 2px; font-weight: bold; transition: all 0.3s ease; }
        .w-btn.active { color: var(--ui-accent); border-color: var(--ui-accent); background: #000; box-shadow: 0 0 8px var(--ui-accent); }

        .wp-btn { width: 22px; height: 22px; background: #111; border: 1px solid #444; color: #555; font-size: 7px; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 2px; transition: all 0.3s ease; font-weight: bold; }
        .wp-btn.active { color: var(--ui-accent); border-color: var(--ui-accent); background: #000; box-shadow: 0 0 10px var(--ui-accent); }

        .pp-center-container { position: absolute; right: 13%; bottom: 42px; z-index: 10; }
        .pp-btn { width: 22px; height: 22px; background: #111; border: 1px solid #444; color: #555; font-size: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 2px; transition: all 0.3s ease; font-weight: bold; }
        .pp-btn.active { color: var(--ui-accent); border-color: var(--ui-accent); background: #000; box-shadow: 0 0 10px var(--ui-accent); }

        .actions-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-top: 15px; }
        .btn { background: #000; color: var(--ui-accent); border: 1px solid var(--ui-accent); padding: 10px 5px; font-size: 9px; font-family: 'Chivo Mono'; cursor: pointer; border-radius: 3px; text-transform: uppercase; font-weight: 700; box-shadow: 0 0 5px var(--ui-accent); transition: all 0.2s; }
        .btn:active { transform: scale(0.96); }
        .btn.active { background: var(--ui-accent); color: #000; box-shadow: 0 0 15px var(--ui-accent); }

        .btn.bypass-on { color: #ff3333 !important; border-color: #ff3333 !important; box-shadow: 0 0 12px #ff3333 !important; }
        .btn.recording { color: #ff3333 !important; border-color: #ff3333 !important; box-shadow: 0 0 15px #ff3333 !important; background: #000 !important; }
        .btn.pending { color: var(--ui-accent) !important; border-color: #fff !important; box-shadow: 0 0 15px var(--ui-accent) !important; }

        .signature-container { position: absolute; bottom: -20px; right: 20px; }
        .signature { font-family: 'Permanent Marker', cursive; font-size: 1.1rem; color: #fff; text-shadow: 0 0 5px var(--ui-accent), 0 0 10px var(--ui-accent); -webkit-text-stroke: 0.5px rgba(0,0,0,0.5); text-stroke: 0.5px rgba(0,0,0,0.5); letter-spacing: 0.5px; }

        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7); backdrop-filter: blur(4px); justify-content: center; align-items: center; }
        .modal-content { background: rgba(26, 26, 26, 0.85); border: 2px solid var(--ui-accent); width: 90%; max-width: 600px; max-height: 85vh; border-radius: 4px; box-shadow: 0 0 30px rgba(0,0,0,1); color: #fff; font-family: 'Chivo Mono', monospace; overflow: hidden; display: flex; flex-direction: column; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #333; flex-shrink: 0; }
        .modal-title { margin: 0; font-size: 14px; text-transform: uppercase; color: var(--ui-accent); }
        .close-modal { background: none; border: none; color: #888; font-size: 20px; cursor: pointer; }
        .close-modal:hover { color: #fff; }
        .modal-body { padding: 15px; overflow-y: auto; display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; flex-grow: 1; }

        .modal-body::-webkit-scrollbar { width: 22px; }
        .modal-body::-webkit-scrollbar-track { background: rgba(26, 26, 26, 0.8); border-left: 1px solid #333; }
        .modal-body::-webkit-scrollbar-thumb { background: rgba(0, 243, 195, 0.4); border-radius: 11px; border: 4px solid rgba(26, 26, 26, 0.8); }

        .modal-category { border: 1px solid #333; padding: 10px; border-radius: 3px; background: rgba(17, 17, 24, 0.6); }
        .cat-title { font-size: 10px; color: var(--ui-accent); margin-bottom: 8px; border-bottom: 1px solid #222; padding-bottom: 4px; }
        .preset-item { font-size: 11px; color: #aaa; padding: 4px 6px; cursor: pointer; border-radius: 2px; }
        .preset-item:hover { background: rgba(34, 34, 34, 0.7); color: #fff; }
        .preset-item.active { background: var(--ui-accent); color: #000; font-weight: bold; }
    </style>
</head>
<body>
<div class="rack">
    <div class="panel">
        <div class="header-box">
            <h1 class="title" onclick="openCreditsModal()">Psy Beard<br>Alpha &Omega;mega</h1>

            <div class="lcd-container">
                <button class="lcd-btn" onclick="prevPreset()">&lt;</button>
                <div class="lcd-display" onclick="openPresetModal()" style="cursor: pointer;">
                    <span class="lcd-text-top" id="lcd-cat">ACID</span>
                    <span class="lcd-text-main" id="lcd-name">Da Funk 303</span>
                </div>
                <button class="lcd-btn" onclick="nextPreset()">&gt;</button>
                <button class="lcd-btn save-btn" onclick="saveToUser()">SAVE</button>
            </div>

            <div class="right-header-controls">
                <div class="vol-header-box">
                    <span class="vol-label">VOL</span>
                    <div class="vol-knob-wrapper" id="w-vol">
                        <div class="vol-led-ring" id="r-vol"></div>
                        <div class="vol-knob" id="k-vol" data-min="0" data-max="100" data-val="70"></div>
                    </div>
                </div>
                <button id="skin-btn" class="skin-btn" onclick="randomizeSkin()">Skin</button>
            </div>
        </div>

        <div id="seq" class="seq-row"></div>
        <div class="len-selector" id="len-btns"></div>
        <div class="controls" id="knob-container">
            <div class="pp-center-container"><div class="pp-btn" id="pp-toggle" onclick="togglePingPong()">PP</div></div>
        </div>
        <div class="actions-grid">
            <button id="start" class="btn" onclick="toggleAudio()">PLAY/STOP</button>
            <button id="mode" class="btn" onclick="switchMode()">MODE:LEAD</button>
            <button id="bypass-btn" class="btn" onclick="toggleBypass()">FX BYPASS</button>
            <button class="btn" onclick="randSeq()">RAND SEQ</button>
            <button class="btn" onclick="panic()">PANIC</button>
            <button id="rec-btn" class="btn" onclick="toggleRec()">REC WAV</button>
        </div>
        <div class="signature-container"><div class="signature">by Lux Stiffmeister</div></div>
    </div>
</div>

<div id="presetModal" class="modal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-header">
            <h2 class="modal-title">Preset List</h2>
            <button class="close-modal" onclick="document.getElementById('presetModal').style.display='none'">&times;</button>
        </div>
        <div class="modal-body" id="modal-preset-list"></div>
    </div>
</div>

<script>
let ctx, mainOsc, subOsc, subGain, noiseNode, noiseGain, fmGain, filter, masterGain, noteGain, driveNode, delayNode, delayGain, reverbNode, reverbGain, recDest, panner;
let isStarted = false, currentStep = 0, synthMode = 'LEAD', recorder, chunks = [], recording = false, loopSteps = 16, fxBypass = false, isPingPong = false, currentWave = 'square', isPinkNoise = false;
let pendingRec = false, pendingStop = false;

const state = { bpm:138, swg:0, freq:50, noise:0, det:5, atk:0.005, len:0.12, sub:0, cut:1200, res:15, drv:30, dly:10, rev:5, fm:0, vol:70 };

        {name: 'Dimension Hop', wave: 'triangle', p: {bpm:144, freq:120, noise:5, det:15, atk:0.005, len:0.22, sub:0, cut:2800, res:23, drv:40, dly:25, rev:30, fm:1400}, seq: pr_psyLead}
    ],
    USER: Array(10).fill().map((_, i) => ({name: `Empty Slot ${i+1}`, wave: 'sawtooth', p: {...state}, seq: Array(16).fill([0, 0, 1]), empty: true}))
};

const categories = ['ACID', 'BASS', 'LEAD', 'PERC', 'FX', 'USER'];
let currentCatIdx = 0;
let currentPreIdx = 0;

const savedUserPresets = localStorage.getItem('psyBeardUserPresets');
if (savedUserPresets) {
    presets.USER = JSON.parse(savedUserPresets);
}

function openPresetModal() {
    const modal = document.getElementById('presetModal');
    const listContainer = document.getElementById('modal-preset-list');
    listContainer.innerHTML = '';

    categories.forEach((cat, catIdx) => {
        const catBox = document.createElement('div');
        catBox.className = 'modal-category';
        const title = document.createElement('div');
        title.className = 'cat-title';
        title.innerText = cat;
        catBox.appendChild(title);

        presets[cat].forEach((pre, preIdx) => {
            const item = document.createElement('div');
            item.className = 'preset-item';
            if(catIdx === currentCatIdx && preIdx === currentPreIdx) item.classList.add('active');
            item.innerText = pre.name;
            item.onclick = () => {
                currentCatIdx = catIdx;
                currentPreIdx = preIdx;
                updatePresetDisplay();
                modal.style.display = 'none';
            };
            catBox.appendChild(item);
        });
        listContainer.appendChild(catBox);
    });

    modal.style.display = 'flex';
}

function closeModal(e) {
    if(e.target.id === 'presetModal') e.target.style.display = 'none';
}

function updatePresetDisplay() {
    const cat = categories[currentCatIdx];
    const pre = presets[cat][currentPreIdx];
    document.getElementById('lcd-cat').innerText = cat;
    document.getElementById('lcd-name').innerText = pre.name;

    setWave(pre.wave);
    for (let key in pre.p) {
        state[key] = pre.p[key];
        const el = document.getElementById(`k-${key}`);
        if (el) {
            updateKnob(el, state[key]);
        }
    }

    if (pre.seq) {
        pre.seq.forEach((sData, i) => {
            stepData[i].on = sData[0] === 1;
            stepData[i].noteIdx = sData[1];
            stepData[i].note = noteMultipliers[sData[1]];
            stepData[i].oct = sData[2];

            const sEl = document.getElementById('step-'+i);
            if (sEl) sEl.classList.toggle('on', stepData[i].on);

            const u = document.querySelectorAll('.step-unit')[i];
            if (u) {
                u.querySelectorAll('select')[0].selectedIndex = stepData[i].noteIdx;
                u.querySelectorAll('select')[1].value = stepData[i].oct;
            }
        });
    }

    if(ctx) updateAudio();
}

function nextPreset() {
    currentPreIdx++;
    if (currentPreIdx >= presets[categories[currentCatIdx]].length) {
        currentPreIdx = 0;
        currentCatIdx = (currentCatIdx + 1) % categories.length;
    }
    updatePresetDisplay();
}

function prevPreset() {
    currentPreIdx--;
    if (currentPreIdx < 0) {
        currentCatIdx = (currentCatIdx - 1 + categories.length) % categories.length;
        currentPreIdx = presets[categories[currentCatIdx]].length - 1;
    }
    updatePresetDisplay();
}

function saveToUser() {
    const name = prompt("Dai un nome al tuo preset:", "My Sound");
    if (name) {
        const currentParams = {...state};
        const currentSeq = stepData.map(d => [d.on ? 1 : 0, d.noteIdx, d.oct]);

        presets.USER[currentPreIdx] = {
            name: name.toUpperCase(),
            wave: currentWave,
            p: currentParams,
            seq: currentSeq,
            empty: false
        };

        localStorage.setItem('psyBeardUserPresets', JSON.stringify(presets.USER));

        currentCatIdx = 5;
        currentPreIdx = presets.USER.length - 1;
        updatePresetDisplay();

        const btn = document.querySelector('.save-btn');
        btn.classList.add('active');
        btn.innerText = 'SAVED!';
        setTimeout(() => { btn.classList.remove('active'); btn.innerText = 'SAVE'; }, 1000);
    }
}

function randomizeSkin() {
    const h1 = Math.floor(Math.random()*360), s1 = 60+Math.random()*40, l1 = 60+Math.random()*20;
    const colorStep = `hsl(${h1},${s1}%,${l1}%)`;

    const h2 = (h1 + 60 + Math.floor(Math.random()*240)) % 360;
    const colorUI = `hsl(${h2}, 80%, 70%)`;

    document.documentElement.style.setProperty('--step-color', colorStep);
    document.documentElement.style.setProperty('--ui-accent', colorUI);
}

function setWave(w) { currentWave = w; document.querySelectorAll('.w-btn').forEach(b => b.classList.toggle('active', b.dataset.w === w)); if(ctx) mainOsc.type = w; }

const grid = document.getElementById('seq');
for(let i=0; i<16; i++) {
    const unit = document.createElement('div'); unit.className = 'step-unit';
    const s = document.createElement('div'); s.className = 'step'; s.id = 'step-'+i;
    s.onclick = () => { stepData[i].on = !stepData[i].on; s.classList.toggle('on', stepData[i].on); };
    const nSel = document.createElement('select'); nSel.className = 'note-sel';
    noteNames.forEach((n, idx) => { let o = new Option(n, noteMultipliers[idx]); nSel.add(o); });
    nSel.onchange = (e) => { stepData[i].note = parseFloat(e.target.value); stepData[i].noteIdx = e.target.selectedIndex; };
    const oSel = document.createElement('select'); oSel.className = 'oct-sel';
    [0.5, 1, 2, 4].forEach(v => { let o = new Option(v+'x', v); if(v===1) o.selected=true; oSel.add(o); });
    oSel.onchange = (e) => stepData[i].oct = parseFloat(e.target.value);
    unit.append(s, nSel, oSel); grid.appendChild(unit);
}

const kWrap = document.getElementById('knob-container');
knobDefs.forEach(d => {
    const box = document.createElement('div'); box.className = 'k-box';
    let waveHtml = (d.id === 'freq') ? `<div class="wave-grid"><button class="w-btn active" data-w="sawtooth" onclick="setWave('sawtooth')">SAW</button><button class="w-btn" data-w="square" onclick="setWave('square')">SQR</button><button class="w-btn" data-w="triangle" onclick="setWave('triangle')">TRI</button><button class="w-btn" data-w="sine" onclick="setWave('sine')">SIN</button></div>` : '';

    if (d.hasWP) {
        box.innerHTML = `${waveHtml}<span class="k-label">${d.label}</span><div class="knob-row-layout"><div class="k-knob-wrapper" id="w-${d.id}"><div class="k-led-ring" id="r-${d.id}"></div><div class="k-knob" id="k-${d.id}" data-min="${d.min}" data-max="${d.max}" data-val="${state[d.id]}"></div></div><div class="wp-btn" id="wp-toggle" onclick="toggleNoiseType()">W/P</div></div><span class="k-val" id="v-${d.id}">${state[d.id]}</span>`;
    } else {
        box.innerHTML = `${waveHtml}<span class="k-label">${d.label}</span><div class="k-knob-wrapper" id="w-${d.id}"><div class="k-led-ring" id="r-${d.id}"></div><div class="k-knob" id="k-${d.id}" data-min="${d.min}" data-max="${d.max}" data-val="${state[d.id]}"></div></div><span class="k-val" id="v-${d.id}">${state[d.id]}</span>`;
    }

    kWrap.appendChild(box);
});

function togglePingPong() { isPingPong = !isPingPong; document.getElementById('pp-toggle').classList.toggle('active', isPingPong); if(ctx) updateAudio(); }
function toggleNoiseType() { isPinkNoise = !isPinkNoise; document.getElementById('wp-toggle').classList.toggle('active', isPinkNoise); if(ctx) createNoise(); }

function initAudio() {
    ctx = new (window.AudioContext || window.webkitAudioContext)(); recDest = ctx.createMediaStreamDestination(); driveNode = ctx.createWaveShaper(); filter = ctx.createBiquadFilter(); noteGain = ctx.createGain(); masterGain = ctx.createGain(); delayNode = ctx.createDelay(1.0); delayGain = ctx.createGain(); panner = ctx.createStereoPanner();
    let fb = ctx.createGain(); fb.gain.value = 0.45; delayNode.connect(fb); fb.connect(delayNode);
    reverbNode = ctx.createConvolver(); reverbGain = ctx.createGain(); createReverb();
    let fmOsc = ctx.createOscillator(); fmGain = ctx.createGain(); fmOsc.connect(fmGain);
    mainOsc = ctx.createOscillator(); mainOsc.type = currentWave; noiseGain = ctx.createGain();

    subOsc = ctx.createOscillator();
    subOsc.type = "sine";
    subGain = ctx.createGain(); subGain.gain.value = 0;
    subOsc.connect(subGain); subGain.connect(driveNode);
    subOsc.start();

    fmGain.connect(mainOsc.frequency); mainOsc.connect(driveNode);
    driveNode.connect(filter); filter.connect(noteGain); noteGain.connect(masterGain); noteGain.connect(delayNode); noteGain.connect(reverbNode); masterGain.connect(ctx.destination); masterGain.connect(recDest); delayNode.connect(delayGain); delayGain.connect(panner); panner.connect(ctx.destination); panner.connect(recDest); reverbNode.connect(reverbGain); reverbGain.connect(ctx.destination); reverbGain.connect(recDest); fmOsc.start(); mainOsc.start(); createNoise(); scheduler();
}
function createNoise() { if(noiseNode) noiseNode.disconnect(); const bufferSize = 2 * ctx.sampleRate, buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate), data = buffer.getChannelData(0); if (!isPinkNoise) { for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1; } else { let b0, b1, b2, b3, b4, b5, b6; b0 = b1 = b2 = b3 = b4 = b5 = b6 = 0.0; for (let i = 0; i < bufferSize; i++) { let white = Math.random() * 2 - 1; b0 = 0.99886 * b0 + white * 0.0555179; b1 = 0.99332 * b1 + white * 0.0750759; b2 = 0.96900 * b2 + white * 0.1538520; b3 = 0.86650 * b3 + white * 0.3104856; b4 = 0.55000 * b4 + white * 0.5329522; b5 = -0.7616 * b5 - white * 0.0168980; data[i] = b0 + b1 + b2 + b3 + b4 + b5 + b6 + white * 0.5362; data[i] *= 0.11; b6 = white * 0.115926; } } noiseNode = ctx.createBufferSource(); noiseNode.buffer = buffer; noiseNode.loop = true; noiseNode.connect(noiseGain); noiseGain.connect(driveNode); noiseNode.start(); }
function createReverb() { let len = ctx.sampleRate * 2, buff = ctx.createBuffer(2, len, ctx.sampleRate); for(let i=0; i<2; i++){ let d = buff.getChannelData(i); for(let j=0; j<len; j++) d[j] = (Math.random()*2-1)*Math.pow(1-j/len, 3); } reverbNode.buffer = buff; }

function scheduler() {
    if(isStarted) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('now'));
        const stepEl = document.getElementById('step-'+currentStep); if(stepEl) stepEl.classList.add('now');

        if(currentStep === 0) {
            if(pendingRec) {
                chunks = [];
                recorder = new MediaRecorder(recDest.stream);
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = () => {
                    let a = document.createElement('a');
                    a.href = URL.createObjectURL(new Blob(chunks, {type:'audio/wav'}));
                    a.download = 'psy_beard_lux.wav'; a.click();
                };
                recorder.start();
                recording = true; pendingRec = false;
                const btn = document.getElementById('rec-btn');
                btn.classList.remove('pending'); btn.classList.add('recording'); btn.innerText = 'REC [ON]';
            } else if(pendingStop) {
                recorder.stop();
                recording = false; pendingStop = false;
                const btn = document.getElementById('rec-btn');
                btn.classList.remove('recording'); btn.innerText = 'REC WAV';
            }
        }

        if(stepData[currentStep].on) {
            const now = ctx.currentTime, targetFreq = state.freq * stepData[currentStep].note * stepData[currentStep].oct;
            noteGain.gain.cancelScheduledValues(now);
            noteGain.gain.setTargetAtTime(0, now, 0.002);
            if(isPingPong) panner.pan.setValueAtTime(currentStep % 2 === 0 ? -0.7 : 0.7, now); else panner.pan.setValueAtTime(0, now);

            if(synthMode === 'LEAD') {
                mainOsc.frequency.setTargetAtTime(targetFreq + (state.det / 2), now, 0.005);

                subOsc.frequency.setTargetAtTime(targetFreq / 2, now, 0.005);
                const subAmt = state.sub / 100;
                subGain.gain.setTargetAtTime(subAmt * 0.5, now, 0.005);

                noteGain.gain.setTargetAtTime(0.6, now + 0.002, state.atk / 2);
                noteGain.gain.setTargetAtTime(0, now + state.atk + state.len, 0.05);
            } else {
                mainOsc.frequency.setValueAtTime(targetFreq * 2.5, now);
                mainOsc.frequency.exponentialRampToValueAtTime(targetFreq, now + 0.04);

                subGain.gain.setTargetAtTime(0, now, 0.005);

                noteGain.gain.setTargetAtTime(0.8, now, 0.005);
                noteGain.gain.setTargetAtTime(0, now + 0.08, 0.02);
            }
        }
        currentStep = (currentStep + 1) % loopSteps;
    }
    updateAudio();
    let bt = (60000/state.bpm)/4; setTimeout(scheduler, (currentStep % 2 !== 0) ? bt * (1 + state.swg/100) : bt * (1 - state.swg/100));
}

function updateAudio() {
    if(!ctx) return;
    masterGain.gain.setTargetAtTime((state.vol/100) * 1.5, ctx.currentTime, 0.02);
    filter.frequency.setTargetAtTime(state.cut, ctx.currentTime, 0.02);
    filter.Q.value = state.res;
    fmGain.gain.value = state.fm;
    delayGain.gain.value = fxBypass ? 0 : state.dly/180;
    reverbGain.gain.value = fxBypass ? 0 : state.rev/250;
    noiseGain.gain.value = state.noise / 250;
    delayNode.delayTime.value = (60/state.bpm)*0.75;
    driveNode.curve = (function(k){ let n = 44100, curve = new Float32Array(n), x; for(let i=0; i<n; i++) { x = i*2/n-1; curve[i] = (3+k)*x*20*(Math.PI/180)/(Math.PI+k*Math.abs(x)); } return curve; })(state.drv);
}

function toggleAudio() { if(!ctx) initAudio(); if(ctx.state==='suspended') ctx.resume(); isStarted=!isStarted; document.getElementById('start').classList.toggle('active'); }
function switchMode() { synthMode=(synthMode==='LEAD'?'PERC':'LEAD'); document.getElementById('mode').innerText='MODE:'+synthMode; }
function randSeq() { stepData.forEach((d, i) => { d.on = Math.random() > 0.3; d.noteIdx = Math.floor(Math.random()*12); d.note = noteMultipliers[d.noteIdx]; d.oct = [0.5, 1, 2][Math.floor(Math.random()*3)]; document.getElementById('step-'+i).classList.toggle('on', d.on); const u = document.querySelectorAll('.step-unit')[i]; u.querySelectorAll('select')[0].selectedIndex = d.noteIdx; u.querySelectorAll('select')[1].value = d.oct; }); }
function panic() { document.querySelectorAll('.k-knob').forEach(k => { const id = k.id.split('-')[1]; if(id!=='vol'&&id!=='bpm'&&id!=='swg') updateKnob(k, Math.random()*(k.dataset.max-k.dataset.min)+ +k.dataset.min); }); }

function toggleRec() {
    const btn = document.getElementById('rec-btn');
    if(!isStarted) { alert("Premi PLAY prima di registrare a tempo!"); return; }

    if(!recording && !pendingRec) {
        pendingRec = true;
        btn.classList.add('pending');
        btn.innerText = 'WAIT...';
    } else if(recording) {
        pendingStop = true;
        btn.innerText = 'END...';
    }
}

function toggleBypass() { fxBypass = !fxBypass; document.getElementById('bypass-btn').classList.toggle('bypass-on', fxBypass); if(ctx) updateAudio(); }

function updateKnob(el, val) {
    val = Math.max(el.dataset.min, Math.min(el.dataset.max, val));
    el.dataset.val = val;
    let id = el.id.split('-')[1];
    state[id] = val;
    let deg = ((val-el.dataset.min)/(el.dataset.max-el.dataset.min)*280);

    const ring = document.getElementById('r-'+id);
    if(ring) ring.style.setProperty('--v', deg+'deg');

    const valText = document.getElementById('v-'+id);
    if(valText) valText.innerText = (id=='len' || id=='atk') ? Math.round(val*1000)+'ms' : Math.round(val);

    if(ctx) updateAudio();
}

document.querySelectorAll('.k-knob-wrapper').forEach(wrapper => {
    let y = 0, drag = false;
    const knob = wrapper.querySelector('.k-knob');
    wrapper.onpointerdown = e => { drag=true; y=e.clientY; wrapper.setPointerCapture(e.pointerId); };
    wrapper.onpointermove = e => { if(drag) { updateKnob(knob, parseFloat(knob.dataset.val) + (y - e.clientY) * ((knob.dataset.max - knob.dataset.min)/180)); y = e.clientY; } };
    wrapper.onpointerup = () => drag=false;
    updateKnob(knob, state[knob.id.split('-')[1]]);
});

const volWrapper = document.getElementById('w-vol');
const volKnob = document.getElementById('k-vol');
let volY = 0, volDrag = false;
volWrapper.onpointerdown = e => { volDrag=true; volY=e.clientY; volWrapper.setPointerCapture(e.pointerId); };
volWrapper.onpointermove = e => { if(volDrag) { updateKnob(volKnob, parseFloat(volKnob.dataset.val) + (volY - e.clientY) * ((volKnob.dataset.max - volKnob.dataset.min)/180)); volY = e.clientY; } };
volWrapper.onpointerup = () => volDrag=false;
updateKnob(volKnob, state['vol']);

const lenBar = document.getElementById('len-btns'); for(let i=1; i<=16; i++){ const b = document.createElement('div'); b.className = 'len-btn'; b.innerText = i; if(i===16) b.classList.add('active'); b.onclick = () => updateLoopLen(i); lenBar.appendChild(b); }

function updateLoopLen(val) {
    loopSteps = val;
    document.querySelectorAll('.len-btn').forEach((b,idx) => b.classList.toggle('active', idx+1 === val));

    document.querySelectorAll('.step-unit').forEach((unit, idx) => {
        if (idx >= val) {
            unit.classList.add('disabled');
        } else {
            unit.classList.remove('disabled');
        }
    });
}

            <div class="cat-title" style="font-size: 10px; margin-top: 20px; margin-bottom: 15px; color: var(--ui-accent);">CREDITS</div>
